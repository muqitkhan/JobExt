name: Bug report
description: Report a bug in JobExt
title: "[Bug]: "
labels: bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Other
  - type: input
    id: version
    attributes:
      label: Extension version
  - type: textarea
    id: logs
    attributes:
      label: Error messages / console logs
